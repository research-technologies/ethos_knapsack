name: "build-test-lint"
run-name: Build of ${{ github.ref_name }} by @${{ github.actor }}
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug_step:
        required: false
        description: "Pause the selected step to debug using tmate"
        type: choice
        default: ""
        options:
          - ""
          - build
          - test
          - lint

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: setup
        name: Setup
        uses: notch8/actions/setup-env@v1.0.4
        with:
          tag: ${{ inputs.tag }}
          image_name: ${{ inputs.image_name }}
          token: ${{ secrets.CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}
          subdir: ${{ inputs.subdir }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_step == 'build' }}
        with:
          limit-access-to-actor: true
      - name: Retag action for base
        if: ${{ inputs.baseTarget != '' }}
        id: meta-base
        uses: docker/metadata-action@v4.1.1
        with:
          images: |
            name=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Retag action for web
        if: ${{ inputs.webTarget != '' }}
        id: meta-web
        uses: docker/metadata-action@v4.1.1
        with:
          images: |
            name=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Retag action for worker
        if: ${{ inputs.workerTarget != '' }}
        id: meta-worker
        uses: docker/metadata-action@v4.1.1
        with:
          images: |
            name=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Retag action for solr
        if: ${{ inputs.solrTarget != '' }}
        id: meta-solr
        uses: docker/metadata-action@v4.1.1
        with:
          images: |
            name=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/solr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push base
        if: ${{ inputs.baseTarget != '' }}
        uses: notch8/actions/build-and-push@v1.0.4
        with:
          type: base
          location: /base
          subdir: ${{ inputs.subdir }}
          tags: ${{ steps.meta-base.outputs.tags }}
      - name: Build and push web and worker
        if: ${{ inputs.webTarget != '' && inputs.workerTarget != '' }}
        uses: notch8/actions/build-and-push@v1.0.4
        with:
          type: web,worker
          location: ""
          subdir: ${{ inputs.subdir }}
          tags: ${{ steps.meta-base.outputs.tags }}
      - name: Build and push web
        if: ${{ inputs.webTarget != '' && inputs.workerTarget == '' }}
        uses: notch8/actions/build-and-push@v1.0.4
        with:
          type: web
          location: ""
          subdir: ${{ inputs.subdir }}
          tags: ${{ steps.meta-base.outputs.tags }}
      - name: Build and push worker
        if: ${{ inputs.workerTarget != '' && inputs.webTarget == '' }}
        uses: notch8/actions/build-and-push@v1.0.4
        with:
          type: worker
          location: /worker
          subdir: ${{ inputs.subdir }}
          tags: ${{ steps.meta-worker.outputs.tags }}
      - name: Build and push solr
        if: ${{ inputs.solrTarget != '' }}
        uses: notch8/actions/build-and-push@v1.0.4
        with:
          type: solr
          location: /solr
          subdir: ${{ inputs.subdir }}
          tags: ${{ steps.meta-solr.outputs.tags }}

  lint:
    needs: push
    uses: notch8/actions/.github/workflows/lint.yaml@v1.0.4
    with:
      webTarget: hyku-web
      workerTarget: hyku-worker
      rubocop_cmd: "bundle exec rubocop --parallel --format progress"

  test:
    needs: push
    uses: notch8/actions/.github/workflows/test.yaml@v1.0.4
    with:
      confdir: "/app/samvera/hyrax-webapp/solr/conf"
      rspec_cmd: "cd .. && gem install semaphore_test_boosters && bundle && rspec_booster --job $CI_NODE_INDEX/$CI_NODE_TOTAL"

  reports:
    if: always()
    needs: [test, lint]
    uses: notch8/actions/.github/workflows/report.yaml@v1.0.4
